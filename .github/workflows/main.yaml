---
name: Build and test WoTIS

on: [pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Run WoTIS resource generation
        run: uv run wotis generate-wot-resources

      - name: Run WoTIS spec generation
        run: uv run wotis generate-wot-resources -d
