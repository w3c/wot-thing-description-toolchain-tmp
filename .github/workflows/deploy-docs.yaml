name: Deploy Thing Description Specification to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      DOCS_OUTPUT_PATH: resources/gens

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Generate Thing Description Specification
        run: uv run wotis generate-wot-resources -d

      - name: Upload Generated Artifacts
        uses: actions/upload-pages-artifact@v4
        with:
          name: wotis-generated-docs
          path: ${{ env.DOCS_OUTPUT_PATH }}
