id: https://www.w3.org/2019/wot/security
name: wot_security
title: WoT Security Schema
description: LinkML Schema for modelling the Thing Description security mechanisms .
version: "1.1-2-June-2025"
license: MIT
contributors: Mahda_Noura
see_also:
  - https://www.w3.org/TR/wot-thing-description11/#sec-security-vocabulary-definition
prefixes:
  wot: https://www.w3.org/2019/wot/security#
  linkml: https://w3id.org/linkml/
  xsd: http://www.w3.org/2001/XMLSchema#
  td: https://www.w3.org/2019/wot/td#
default_prefix: wot
imports:
  - linkml:types


slots:
  scheme:
    description: Identification of the security mechanism being configured.
    required: true
    range: SecuritySchemeList

  alg:
    description: Encoding, encryption, or digest algorithm (e.g., ES256, ES512-256).
    range: string

  flow:
    description: Authorization flow.
    range: OAuth2Flow

  TODO_format:
    description: Specifies format of security authentication information.
    range: BearerFormat

  identity:
    description: Identifier providing information which can be used for selection or confirmation.
    range: string

  in:
    description: Specifies the location of security authentication information.
    range: SecurityLocationType
    comments:
      - Default value should be provided by implementations

  #this is the name in wot_Security, however it is modelled like this because in LinkML name is a reserved key!
  "@name":
    description: >-
      Name for query, header, cookie, or uri parameters. When used with body location, must be a JSON pointer.
    annotations:
      spec_table_definition: >-
        Name for query, header, cookie, or uri parameters.
    range: string

  qop:
    description: Quality of protection.
    range: QoPType
    comments:
      - This feature is at risk.

  scopes:
    description: >-
      Set of authorization scope identifiers provided as an array. These are provided in tokens returned by an 
      authorization server and associated with forms in order to identify what resources a client may access and how.
    annotations:
      spec_table_definition: >-
        Set of authorization scope identifiers provided as an array. 
        These are provided in tokens returned by an authorization server and associated with forms in order to identify what resources 
        a client may access and how. The values associated with a form SHOULD be chosen from those defined in an `OAuth2SecurityScheme` active on that form.
    any_of:
      - range: string
      - range: string
        multivalued: true
    comments:
      - This feature is at risk.

  proxy:
    description: >-
      URI of the proxy server this security configuration provides access to. If not given, the corresponding 
      security configuration is for the endpoint.
    range: uri
    comments:
      - This feature is at risk.

  authorization:
    description: URI of the authorization server.
    range: uri

  refresh:
    description: URI of the refresh server.
    range: uri

  token:
    description: URI of the token server.
    range: uri


  allOf:
    description: >-
      Array of two or more strings identifying other named security scheme definitions, all of which must be 
      satisfied for access.
    range: SecurityScheme
    multivalued: true
    minimum_value: 2


classes:
  SecurityScheme:
    description: >-
      Metadata describing the configuration of a security mechanism. The value assigned to the name scheme MUST be defined 
      within a Vocabulary included in the Thing Description. For all security schemes, any keys, passwords, or other 
      sensitive information directly providing access MUST NOT be stored in the TD and should instead be shared and 
      stored out-of-band via other mechanisms.
    annotations:
      spec_table_definition: >-
        Metadata describing the configuration of a security mechanism. The value assigned to the name `scheme` MUST be defined 
        within a Vocabulary included in the Thing Description, either in the standard Vocabulary defined in [TD Information Model](#sec-vocabulary-definition) or in a [TD Context Extension](#sec-vocabulary-definition).
        
        For all security schemes, any keys, passwords, or other sensitive information directly providing access *MUST NOT* be stored in the TD and should instead be shared and stored out-of-band via other mechanisms.
        The purpose of a TD is to describe how to access a Thing if and only if a Consumer already has authorization, and is not meant be used to grant that authorization.
        
        Each security scheme object used in a TD defines a set of requirements to be met before access can be granted. We say a security scheme is *satisfied* when all its requirements are met. In some cases requirements from multiple security schemes will have to be met before access can be granted.

        Security schemes generally may require additional authentication parameters, such as a password or key. The location of this information is indicated by the value associated with the name `in`, often in combination with the value associated with `name`. The value associated with `in` can take one of the following values:
        
        **header**:
        The parameter will be given in a header provided by the protocol, with the name of the header provided by the value of name.
        
        **query**:
        The parameter will be appended to the URI as a query parameter, with the name of the query parameter provided by name.
        
        **body**:
        The parameter will be provided in the body of the request payload, with the data schema element used provided by *name*. When used in the context of a *body* security information location, the value of name *MUST* be in the form of a JSON pointer [[RFC6901]] relative to the root of the input `DataSchema` for each interaction it is used with. Since this value is not a fragment identifier, and is not relative to the root of the TD but to whichever data schemas the security scheme is bound to, this value should not start with #; it is a "pure" JSON pointer. Since this value is not a fragment identifier, it also does not need to URL-encode special characters. The targeted element may or may not already exist at the specified location in the referenced object or array schema (consequently the mechanism is not applicable to simple types). If it does not, it will be inserted. This avoids having to duplicate definitions in the data schemas of every interaction. When an element of a data schema indicated by a JSON pointer indicated in a body locator does not already exist in the indicated schema, it *MUST* be possible to insert the indicated element at the location indicated by the pointer. The JSON pointer used in the body locator *MAY* use the "-" character to indicate a non-existent array element when it is necessary to insert an element after the last element of an existing array. The element referenced (or created) by a `body` security information location *MUST* be required and of type "string". If name is not given, it is assumed the entire body is to be used as the security parameter.
        
        **cookie**:
        The parameter is stored in a cookie identified by the value of name.
        
        **uri**:
        The parameter is embedded in the URI itself, which is encoded in the relevant interaction using a URI template variable defined by the value of name. This is more general than the query mechanism but more complex. The value uri SHOULD be specified for the name in in a security scheme only if query is not applicable. The URIs provided in interactions where a security scheme using uri as the value for in MUST be a URI template including the defined variable.
        
        **auto**:
        The location is determined as part of the protocol, or negotiated. If a value of `auto` is set for the `in` field of a `SecurityScheme`, then the name field *SHOULD NOT* be set. In this case, the application of the `SecurityScheme` is subject to the respective specification for the given protocol (e.g. [[RFC8288]] when using the `BasicSecurityScheme` with HTTP).
        
        If multiple parameters are needed for a security scheme, repeat the security scheme definition for each parameter and combine them using a combo security scheme and `allOf`. In some cases parameters may not actually be secret but a user may wish to leave them out of the TD to help protect privacy. As an example of this, some security mechanisms require both a client identifier and a secret key. In theory, the client identifier is public however it may be hard to update and pose a tracking risk. In such a case it can be provided as an additional security parameter so it does not appear in the TD.

        The names of URI variables declared in a `SecurityScheme` MUST be distinct from all other URI variables declared in the TD.
      spec_scope_note: |
        The !class SecurityScheme has the following subclasses:

        - NoSecurityScheme
        - AutoSecurityScheme
        - ComboSecurityScheme
        - BasicSecurityScheme
        - DigestSecurityScheme
        - APIKeySecurityScheme
        - BearerSecurityScheme
        - PSKSecurityScheme
        - OAuth2SecurityScheme
      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    slots:
      - "@type"
      - description
      - descriptions
      - proxy
      - scheme
    slot_usage:
      "@type":
        range: string
        exactly_one_of:
          - range: string
          - range: string
            multivalued: true
            minimum_value: 1


  NoSecurityScheme:
    is_a: SecurityScheme
    description: >-
      A security configuration indicating there is no authentication or other mechanism required to access the resource.
    annotations:
      spec_table_definition: >-
        A security configuration corresponding to identified by the Vocabulary Term `nosec` (i.e., "scheme": "nosec"), indicating there is no authentication or other mechanism required to access the resource.
      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    slot_usage:
      scheme:
        pattern: ^nosec$

  AutoSecurityScheme:
    is_a: SecurityScheme
    description: >-
      An automatic authentication security configuration identified by the term auto. This scheme indicates that the security 
      parameters are going to be negotiated by the underlying protocols at runtime.
    annotations:
      spec_table_definition: >-
        An automatic authentication security configuration identified by the term `auto` (i.e., "scheme": "auto"). This scheme indicates that the security parameters are going to be negotiated by the underlying protocols at runtime, subject to the respective specifications for the protocol (e.g. [[RFC8288]] for Basic Authentication when using HTTP).
      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    slot_usage:
      scheme:
        pattern: ^auto$

  ComboSecurityScheme:
    is_a: SecurityScheme
    description: >-
      A combination of other security schemes. Exactly one of either oneOf or allOf vocabulary terms MUST be included.
    annotations:
      spec_table_definition: >-
        A combination of other security schemes identified by the Vocabulary Term `combo` (i.e., "scheme": "combo"). 
        Elements of this scheme define various ways in which other named schemes defined in `securityDefinitions`, 
        including other ComboSecurityScheme definitions, are to be combined to create a new scheme definition. Exactly 
        one of either `oneOf` or `allOf` vocabulary terms MUST be included. Only security scheme definitions which can 
        be used together can be combined with `allOf`. For example, it is not possible in general to combine different 
        OAuth 2.0 flows together using `allOf` unless one applies to a proxy and one to the endpoint. Note that when 
        multiple named security scheme definitions are listed in a `security` field the same semantics apply as in an `allOf` 
        combination (and the same limitations on allowable combinations). The `oneOf` combination is equivalent to using different 
        security schemes on forms that are otherwise identical. In this sense a `oneOf` scheme is not an essential feature but it does avoid redundancy in such cases.
      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    slots:
      - oneOf
      - allOf
    slot_usage:
      scheme:
        pattern: ^combo$
      oneOf:
        description: >-
          Array of two or more strings identifying other named security scheme definitions, any one of which, when satisfied, will allow access. Only one may be chosen for use.
        range: string
        multivalued: true
        minimum_value: 2
      allOf:
        range: string
        multivalued: true
        minimum_value: 2

  BasicSecurityScheme:
    is_a: SecurityScheme
    description: >-
      Basic Authentication security configuration using an unencrypted username and password.
    annotations:
      spec_table_definition: >-
        Basic Authentication [[RFC7617]] security configuration identified by the Vocabulary Term `basic` (i.e., "scheme": "basic"), using an unencrypted username and password.
      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    slots:
      - "@name"
      - in

  DigestSecurityScheme:
    is_a: SecurityScheme
    description: >-
      Digest Access Authentication security configuration. This scheme is similar to basic authentication but with 
      added features to avoid man-in-the-middle attacks.
    annotations:
      spec_table_definition: >-
        Digest Access Authentication [[RFC7616]] security configuration identified by the Vocabulary Term `digest` (i.e., "scheme": "digest").
        This scheme is similar to basic authentication but with added features to avoid man-in-the-middle attacks.
      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    slots:
      - "@name"
      - in
      - qop

  APIKeySecurityScheme:
    is_a: SecurityScheme
    description: >-
      API key authentication security configuration identified by the term apikey. This scheme is to be used when the 
      access token is opaque, for example when a key in an unknown or proprietary format is provided by a cloud service provider.
    annotations:
      spec_table_definition: >-
        API key authentication security configuration identified by the Vocabulary Term `apikey` (i.e., "scheme": "apikey"). 
        This scheme is to be used when the access token is opaque, for example when a key in an unknown or proprietary format is provided by a cloud service provider. 
        In this case the key may not be using a standard token format. 
        This scheme indicates that the key provided by the service provider needs to be supplied as part of service requests using the mechanism indicated by the `in` field.
      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    slots:
      - "@name"
      - in
    slot_usage:
      scheme:
        pattern: ^apikey$
      in:
        required: true
        range: SecurityLocationType

  BearerSecurityScheme:
    is_a: SecurityScheme
    description: >-
      Bearer Token security configuration for situations where bearer tokens are used independently of OAuth2.
    annotations:
      spec_table_definition: >-
        Bearer Token [[RFC6750]] security configuration identified by the Vocabulary Term `bearer` (i.e., "scheme": "bearer") 
        for situations where bearer tokens are used independently of OAuth2. If the `oauth2` scheme is specified it is not 
        generally necessary to specify this scheme as well as it is implied. For `format`, the value `jwt` indicates conformance 
        with [[RFC7519]], `jws` indicates conformance with [[RFC7797]], `cwt` indicates conformance with [[RFC8392]], 
        and `jwe` indicates conformance with [[RFC7516]], with values for `alg` interpreted consistently with those standards. 
        Other formats and algorithms for bearer tokens MAY be specified in vocabulary extensions.
      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    slots:
      - authorization
      - "@name"
      - in
      - alg
      - format

  PSKSecurityScheme:
    is_a: SecurityScheme
    description: >-
      Pre-shared key authentication security configuration. This is meant to identify that a standard is used for 
      pre-shared keys such as TLS-PSK.
    annotations:
      spec_table_definition: >-
        Pre-shared key authentication security configuration identified by the Vocabulary Term `psk` (i.e., "scheme": "psk"). 
        This is meant to identify that a standard is used for pre-shared keys such as TLS-PSK [[RFC4279]], 
        and that the ciphersuite used for keys will be established during protocol negotiation.
      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    slots:
      - identity

  OAuth2SecurityScheme:
    is_a: SecurityScheme
    description: >-
      OAuth 2.0 authentication security configuration for systems conformant with RFC6749 and RFC8252.
    annotations:
      spec_table_definition: >-
        OAuth 2.0 authentication security configuration for systems conformant with [[RFC6749]] and [[RFC8252]], 
        identified by the Vocabulary Term `oauth2` (i.e., "scheme": "oauth2").
      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    slots:
      - authorization
      - token
      - refresh
      - scopes
      - flow
    slot_usage:
      scopes:
        exactly_one_of:
          - range: string
          - range: string
            multivalued: true
      flow:
        required: true

enums:
  SecuritySchemeList:
    description: Identification of the security mechanism being configured.
    permissible_values:
      nosec:
        description:
      combo:
        description:
      basic:
        description:
      digest:
        description:
      bearer:
        description:
      psk:
        description:
      oauth2:
        description:
      apikey:
        description:
      auto:
        description:
  SecurityLocationType:
    description: Specifies the location where security authentication information should be provided
    permissible_values:
      header:
        description: The parameter will be given in a header provided by the protocol
      query:
        description: The parameter will be appended to the URI as a query parameter
      body:
        description: The parameter will be provided in the body of the request payload
      cookie:
        description: The parameter is stored in a cookie
      uri:
        description: The parameter is embedded in the URI itself using a URI template variable
      auto:
        description: The location is determined as part of the protocol, or negotiated

  QoPType:
    description: Quality of protection options for digest security
    permissible_values:
      auth:
        description: Authentication only
      auth-int:
        description: Authentication with integrity protection

  BearerFormat:
    description: Format specifications for bearer tokens
    permissible_values:
      jwt:
        description: JSON Web Token (RFC7519)
      jws:
        description: JSON Web Signature (RFC7797)
      cwt:
        description: CBOR Web Token (RFC8392)
      jwe:
        description: JSON Web Encryption (RFC7516)

  OAuth2Flow:
    description: OAuth 2.0 authorization flows
    permissible_values:
      code:
        description: Authorization code flow
      client:
        description: Client credentials flow
