id: https://www.w3.org/2019/wot/hypermedia
name: hypermedia
title: Hypermedia Controls Ontology
description: >-
  LinkML schema for modelling the TD Hypermedia Control information model, in particular links and forms.
version: "1.1-11-May-2026"
license: MIT
contributors: Mahda_Noura
see_also:
  - https://www.w3.org/TR/wot-thing-description11/#sec-hypermedia-vocabulary-definition
prefixes:
  hctl: https://www.w3.org/2019/wot/hypermedia#
  linkml: https://w3id.org/linkml/
  xsd: http://www.w3.org/2001/XMLSchema#
  td: https://www.w3.org/2019/wot/td#
  bcp47: https://tools.ietf.org/html/bcp47
  tm: https://www.w3.org/2019/wot/tm#

imports:
  - linkml:types


enums:
  LinkRelationType:
    description: >-
      Best practice relation type values recommended for use within WoT Thing Description or Thing Model instances.
    permissible_values:
      icon:
        description: Imports an icon associated to the Thing
        comments:
          - "Occurrence - 0..*"
          - "Source - IANA Link Relation"
      service-doc:
        description: Relation to resource that provides documentation about the Thing
        comments:
          - "Occurrence - 0..*"
          - "Source - IANA Link Relation"
      alternate:
        description: Alternative representation of the Thing
        comments:
          - "Occurrence - 0..*"
          - "Source - IANA Link Relation"
      type:
        description: Indicate that the Thing is an instance of the target resource
        comments:
          - "Occurrence - 0..1"
          - "Source - IANA Link Relation"
      tm:extends:
        description: Extends the existing definition of the target resource
        comments:
          - "Occurrence - 0..1"
          - "Source - W3C WoT Thing Model"
      tm:submodel:
        description: Compose one or multiple Thing Models
        comments:
          - "Occurrence - 0..*"
          - "Source - W3C WoT Thing Model"
      manifest:
        description: Point to web app manifest
        comments:
          - "Occurrence - 0..*"
          - "Source - IANA Link Relation"
      proxy-to:
        description: Target resource provides the address of a proxy
        comments:
          - "Occurrence - 0..*"
          - "Source - W3C WoT Security"
      collection:
        description: Points to a collection of Things that the current Thing is part of
        comments:
          - "Occurrence - 0..1"
          - "Source - IANA Link Relation"
      item:
        description: Points to a Thing being a member of a collection Thing
        comments:
          - "Occurrence - 0..*"
          - "Source - IANA Link Relation"
      predecessor-version:
        description: Points to a previous TD or TM version of the same Thing
        comments:
          - "Occurrence - 0..1"
          - "Source - IANA Link Relation"
      controlledBy:
        description: Refers to the Thing that controls the context Thing
        comments:
          - "Occurrence - 0..*"
          - "Source - W3C Thing Description"
  SubprotocolList:
    permissible_values:
      longpoll:
      websub:
      sse:
  OperationType:
    description: >-
      Well-known operation types for WoT interaction model. The list of possible operation types of a form is fixed. 
      As of this version of the specification, it only includes the well-known types necessary to implement the WoT 
      interaction model.
    comments:
      - Consumer to Thing applies for messages sent by the Consumer to the Thing
      - Thing to Consumer applies for messages sent by the Thing to the Consumer
      - No correlation implies no payload is required or expected
    permissible_values:
      readproperty:
        description: Identifies the read operation on Property Affordances to retrieve the corresponding data
        comments:
          - Thing to Consumer - All fields in the Property Affordance without "writeOnly":true
          - Consumer to Thing - No correlation
      writeproperty:
        description: Identifies the write operation on Property Affordances to update the corresponding data
        comments:
          - Consumer to Thing - All fields in the Property Affordance without "readOnly":true
          - Thing to Consumer - No correlation, additionalResponses can be used in the form level
      observeproperty:
        description: >-
          Identifies the observe operation on Property Affordances to be notified with the new data when the 
          Property is updated
        comments:
          - Thing to Consumer - All fields in the Property Affordance without "writeOnly":true
          - Consumer to Thing - No correlation
      unobserveproperty:
        description: Identifies the unobserve operation on Property Affordances to stop the corresponding notifications
        comments:
          - No payload correlation in either direction
      invokeaction:
        description: Identifies the invoke operation on Action Affordances to perform the corresponding action
        comments:
          - Consumer to Thing - Value of the input key
          - Thing to Consumer - Value of the output key
      queryaction:
        description: Identifies the querying operation on Action Affordances to get the status of the corresponding action
        comments:
          - No correlation, additionalResponses can be used in the form level
      cancelaction:
        description: Identifies the cancel operation on Action Affordances to cancel the ongoing corresponding action
        comments:
          - No correlation, additionalResponses can be used in the form level
      subscribeevent:
        description: >-
          Identifies the subscribe operation on Event Affordances to be notified by the Thing when the event occurs
        comments:
          - Consumer to Thing - Value of the subscription key with all fields without "readOnly":true
          - Thing to Consumer - Value of the subscription key with all fields without "writeOnly":true
      unsubscribeevent:
        description: Identifies the unsubscribe operation on Event Affordances to stop the corresponding notifications
        comments:
          - Consumer to Thing - Value of the subscription key with all fields without "readOnly":true
          - Thing to Consumer - Value of the subscription key with all fields without "writeOnly":true
      readallproperties:
        description: >-
          Identifies the readallproperties operation on a Thing to retrieve the data of all Properties in a 
          single interaction
      writeallproperties:
        description: >-
          Identifies the writeallproperties operation on a Thing to update the data of all writable Properties 
          in a single interaction
      readmultipleproperties:
        description: >-
          Identifies the readmultipleproperties operation on a Thing to retrieve the data of selected Properties 
          in a single interaction
      writemultipleproperties:
        description: >-
          Identifies the writemultipleproperties operation on a Thing to update the data of selected writable 
          Properties in a single interaction
      observeallproperties:
        description: >-
          Identifies the observeallproperties operation on Properties to be notified with new data when any 
          Property is updated
      unobserveallproperties:
        description: >-
          Identifies the unobserveallproperties operation on Properties to stop notifications from all Properties 
          in a single interaction
      queryallactions:
        description: >-
          Identifies the queryallactions operation on a Thing to get the status of all Actions in a single interaction
      subscribeallevents:
        description: >-
          Identifies the subscribeallevents operation on Events to subscribe to notifications from all Events in 
          a single interaction
      unsubscribeallevents:
        description: >-
          Identifies the unsubscribeallevents operation on Events to unsubscribe from notifications from all Events 
          in a single interaction

slots:
  op:
    description: >-
      Indicates the operation type (e.g., readproperty, writeproperty, observeproperty, etc.)
    annotations:
      spec_description: >-
        Indicates the semantic intention of performing the operation(s) described by the form. For example, the Property interaction allows get and set operations. The protocol binding may contain a form for the get operation and a different form for the set operation. The op attribute indicates which form is for which and allows the client to select the correct form for the operation required. op can be assigned one or more interaction verb(s) each representing a semantic intention of an operation.
    exactly_one_of:
      - range: string
      - range: string
        multivalued: true
        minimum_value: 1
  href:
    description: Target IRI of a link or submission target of a form.
    slot_uri: hctl:hasTarget
    range: uri
    required: true
  contentCoding:
    description: >-
      Content coding values indicate an encoding transformation that has been or can be applied to a representation. Content codings are primarily used to allow a representation to be compressed or otherwise usefully transformed without losing the identity of its underlying media type and without loss of information. Examples of content coding include "gzip", "deflate", etc.
    range: string
  contentType:
    description: >-
      Assign a content type based on a media type (e.g., text/plain) and potential parameters 
      (e.g., charset=utf-8) for the media type [RFC2046].
    annotations:
      spec_description: >-
        Assign a content type based on a media type (e.g., `text/plain`) and potential parameters (e.g., `charset=utf-8`) for the media type [[RFC2046]].
    slot_uri: hctl:forContentType
    range: string
  response:
    description: >-
      This optional term can be used if, e.g., the output communication metadata differ from input metadata (e.g., output contentType differ from the input contentType). The response name contains metadata that is only valid for the primary response messages.
    range: ExpectedResponse
  additionalResponses:
    description: >-
      This optional term can be used if additional expected responses are possible, e.g. for error reporting. Each additional response needs to be distinguished from others in some way (for example, by specifying a protocol-specific error code), and may also have its own data schema.
    multivalued: true
    range: AdditionalExpectedResponse
  subprotocol:
    description: >-
      Indicates the exact protocol that should be used for additional notifications.
    annotations:
      spec_description: >-
        Indicates the exact mechanism by which an interaction will be accomplished for a given protocol when there are multiple options. For example, for HTTP and Events, it indicates which of several available mechanisms should be used for asynchronous notifications such as long polling (`longpoll`), WebSub [[websub]] (websub), Server-Sent Events (`sse`) [[html]] (also known as EventSource). Please note that there is no restriction on the subprotocol selection and other mechanisms can also be announced by this subprotocol term.
    range: SubprotocolList
    examples:
      - value: longpoll
      - value: websub
      - value: sse

classes:
  Link:
    class_uri: hctl:Link
    description: >-
      A link can be viewed as a statement of the form
      "**_link context_** has a **_relation type_** resource at **_link target_**",
      where the optional **_target attributes_** may further describe the resource.
    annotations:
      spec_description: >-
        A link can be viewed as a statement of the form **"link context** has a **relation type** resource at **link target**", where the optional **target attributes** may further describe the resource.
      spec_content:
        value:
          - type: note
            text: |
              The hreflang attribute is allowed to be a `string` or `array` in this version of the spec. Depending on the result of [[LINKSET-MEDIA-TYPES]] the values of `hrefLang` can be restricted to `array` only.
          - type: markdown
            text: |
              Link relations can be used to describe relations such as to other Things (e.g., a Switch Thing controls a Lamp Thing), to a specific kind of Thing Models (e.g., a Thing Description is an instance of a specific Thing Model), or to further documentations information (e.g., device manual of a Thing). It is recommended to reuse existing and established Link Relation definitions from IANA.

              The link relation types follow Web Linking [[RFC8288]], meaning:
          - type: list
            items:
              - id: td-rel-type-case-insensitive
                text: |
                  Relation types *MUST* be compared as strings using case-insensitive comparison.
              - id: td-rel-type-lowercase
                text: |
                  All-lowercase URIs *SHOULD* be used for extension relation types.
          - type: markdown
            text: |
              In the following a best practice relation type table is introduced that is recommended to use within WoT Thing Description or Thing Model instances.
          - type: enum_table
            enum: LinkRelationType
            caption: Best practice relation type table
            table_id: table-rel-type
            columns:
              - field: name
                header: Value
              - field: "comment:Occurrence"
                header: Occurrence
              - field: description
                header: Explanation
              - field: "comment:Source"
                header: Source of value origin

      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    attributes:
      href:
        description: Target IRI of a link or submission target of a form.
        slot_uri: hctl:hasTarget
        range: uri
        required: true
      type:
        description: >-
          Target attribute providing a hint indicating what the media type [RFC2046] of the result of 
          dereferencing the link should be.
        annotations:
          spec_description: >-
            Target attribute providing a hint indicating what the media type [[RFC2046]] of the result of dereferencing the link should be.
        slot_uri: hctl:hintsAtMediaType
        range: string
      rel:
        description: A link relation type identifies the semantics of a link.
        slot_uri: hctl:hasRelationType
        range: string
        comments:
          - Recommended to use IANA Link Relations when possible
      anchor:
        description: >-
          Overrides the link context (by default the Thing itself identified by its id) with the given URI or IRI.
        slot_uri: hctl:hasAnchor
        range: uri
      sizes:
        description: >-
          Target attribute that specifies one or more sizes for the referenced icon. Only applicable for relation 
          type "icon". The value pattern follows {Height}x{Width} (e.g., "16x16", "16x16 32x32").
        slot_uri: hctl:hasSizes
        range: string
        pattern: "^(\\d+x\\d+)(\\s+\\d+x\\d+)*$"
      hreflang:
        description: >-
          The hreflang attribute specifies the language of a linked document. The value of this must be a valid 
          language tag [BCP47].
        annotations:
          spec_description: >-
            The hreflang attribute specifies the language of a linked document. The value of this must be a valid language tag [[BCP47]].
        slot_uri: hctl:hasHreflang
        exactly_one_of:
          - range: string
          - range: string
            multivalued: true
            minimum_value: 1
        comments:
          - The hreflang attribute is allowed to be a string or array in this version of the spec
    slot_usage:
      href:
        required: true
        range: uri
        annotations:
          spec_description: >-
            Target IRI of a link or submission target of a form.
      hreflang:
        exactly_one_of:
          - range: string
          - range: string
            multivalued: true
            minimum_value: 1

  Form:
    class_uri: hctl:Form
    description: >-
      A form hypermedia control that describes how an operation can be performed.
    annotations:
      spec_description: >-
        A form can be viewed as a statement of "To perform an **operation type** operation on **form context**, make a **request method** request to **submission target**" where the optional **form fields** may further describe the required request. 
        In Thing Descriptions, the **form context** is the surrounding Object, such as Properties, Actions, and Events or the Thing itself for meta-interactions.
      spec_content:
        value:
          - type: note
            text: |
              The value of the `href` property in a Form instance can be a relative URI or an absolute URI.
          - type: assertion
            id: td-form-href-relative
            text: |
              To properly build the target URI, if base is present in the Thing level, the `href` value *MUST* be resolved using the base URI.
          - type: paragraph
            segments:
              - text: |
                  While this table defines the terms available in a form,
              - id: td-form-additional-mediatype-metadata
                text: |
                  Bindings *MAY* have additional information that specifies representation formats in more detail than the media type alone.
              - text: |
                  For example, in a TD with the Modbus Binding, `modv:mostSignificantByte` in a form describes the endianness of the payload. Please see [Bindings](#bindings) for further information. Furthermore, possible values for the `contentCoding` property can be found, e.g., in the IANA HTTP content coding registry.
          - type: paragraph
            segments:
              - text: |
                  The list of possible operation types of a form is fixed. As of this version of the specification, it only includes the well-known types necessary to implement the WoT interaction model described in [[wot-architecture11]]. Future versions of the standard may extend this list but
              - id: well-known-operation-types-only
                text: |
                  operations types *MUST* be restricted to the values in the table below.
          - type: enum_table
            enum: OperationType
            caption: Well-known operation types
            table_id: table-operation-types
            columns:
              - field: name
                header: Operation Type
              - field: description
                header: Description
          - type: markdown
            text: |
              A Thing Description of a WoT producer may have multiple forms entries with, e.g., different protocol and/or content types declarations that a Consumer could possibly support. In that case the Consumer may choose any form entry that works (e.g., the protocol and content type is supported) for them. When one form is chosen, it is expected that the Consumer will continue to use it as long as possible for every new interaction with the WoT producer.
          - type: paragraph
            segments:
              - id: td-form-context-submission-target
                text: |
                  As a Form but not just the `href` defines how to execute the interaction, `href` of multiple Forms *MAY* point to the same resource, where the different Forms represent different operations on that resource.
              - text: |
                  For example, in a TD with the HTTP Binding, two Forms with HTTP GET and PUT methods can point to the same resource but represent different operations such as `readproperty` and `writeproperty`.
      spec_subsections:
        value:
          - id: sec-op-data-schema-mapping
            title: Mapping op Values to Data Schemas
            class: informative
            content:
              - type: markdown
                text: |
                  Protocols that can be used with TDs follow request-response or eventing mechanisms. The Data Schema of an affordance generally correlates with the `op` keywords used in `forms`. The table below informatively summarizes the available data schema related terms with the `op` keywords.
              - type: list
                items:
                  - text: Consumer to Thing applies for messages sent by the Consumer to the Thing, such as the value for writing a property.
                  - text: Thing to Consumer applies for messages sent by the Thing to the Consumer, such as the value of a property value as the result of reading a property.
                  - text: In case that there is no correlation with the data schema and the operation, it implies that no payload is required for executing the operation or no payload is expected as a result of the operation.
              - type: enum_table
                enum: OperationType
                caption: Mapping op Values to Data Schemas
                require_comments: true
                columns:
                  - field: name
                    header: Operation Type
                  - field: "comment:Consumer to Thing"
                    header: Consumer to Thing DataSchema Correlation
                  - field: "comment:Thing to Consumer"
                    header: Thing to Consumer DataSchema Correlation
              - type: note
                title: writeproperty and observeproperty relationship
                text: Writing to a property does not necessarily mean that a new value will be sent to the Consumer observing the property. It depends on the protocol and implementation.
              - type: note
                title: Further Data Schemas mappings
                text: Further specification of how to map operations to data schemas, as well as mapping meta operations such as `readallproperties` can be found in the respective protocol specification of the [[WOT-BINDING-TEMPLATES]].
          - id: sec-response-usage
            title: Response-related Terms Usage
            content:
              - type: paragraph
                segments:
                  - text: |
                      The optional `response` name-value pair can be used to provide metadata for the expected response message. With the core vocabulary, it can include only content type information, but TD Context Extensions could be applied.
                  - id: td-expectedResponse-default-contentType
                    text: |
                      If no `response` name-value pair is provided, it *MUST* be assumed that the content type of the response is equal to the content type assigned to the Form instance.
                  - text: |
                      Note that `contentType` within an `ExpectedResponse` Class does not have a Default Value.
              - type: markdown
                text: |
                  In some cases additional responses might be possible. One example of this is error responses but in some cases there might also be additional successful responses. In this case, the `response` name-value pair is still used for the primary response but `additionalResponses` may also be provided, whose value is an array of `AdditionalExpectedResponse` objects. Each additional response must be distinguished in some way from the primary response, either by `contentType` or by protocol-specific settings such as error code header values. Each additional response may also have a data schema which can differ from the normal output data schema for the interaction.
              - type: markdown
                text: |
                  In some use cases, input and output data might be represented in a different form, for instance an Action that accepts JSON, but returns an image. In such a case, the optional `response` key-value pair can describe the content type of the expected response. As there is no default value defined, the following assertions apply:
              - type: list
                items:
                  - id: td-expectedResponse-missing-contentType
                    text: |
                      If there is no `contentType` value defined in a `response` object within a form, a Consumer *MUST* expect that the respective response does not contain any payload.
                  - id: td-expectedResponse-defined-contentType
                    text: |
                      If a content type is defined in the `response` object within a form, a Consumer *MUST* expect a response containing a payload in the respective format, e.g., an image in the case of `image/jpeg`.
              - type: markdown
                text: "Similar considerations apply to additional responses:"
              - type: list
                items:
                  - id: td-additionalExpectedResponse-contentType
                    text: |
                      If the content type of an additional expected response differs from the content type of the form, the `Form` instance *MUST* include an entry in the array associated with the name `additionalResponses`.
                  - id: td-additionalExpectedResponse-missing-contentType
                    text: |
                      If there is no `contentType` value defined in an additional expected response object, a Consumer *MUST* expect that the respective response does not contain any payload.
                  - id: td-additionalExpectedResponse-schema
                    text: |
                      If the data schema of an additional expected response differs from the output data schema of the interaction, the `Form` *MUST* include an entry in the array associated with the name `additionalResponses` that includes a value for the name `schema`.
                  - id: td-additionalExpectedResponse-noSchemaWithoutPayload
                    text: |
                      The `schema` of an additional expected response object *MUST NOT* be defined when there is no `contentType` present.
              - type: markdown
                text: |
                  The different cases on the variation of request and response are explained above. The tables at [contentType-usage](#contentType-usage) summarize these cases in a concise manner.
      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    slots:
      - href
      - contentType
      - contentCoding
      - security
      - scopes
      - response
      - additionalResponses
      - subprotocol
      - op

    slot_usage:
      op:
        annotations:
          spec_default: true
          spec_type_values:
            value:
              mode: one_of
              values:
                - readproperty
                - writeproperty
                - observeproperty
                - unobserveproperty
                - invokeaction
                - queryaction
                - cancelaction
                - subscribeevent
                - unsubscribeevent
                - readallproperties
                - writeallproperties
                - readmultipleproperties
                - writemultipleproperties
                - observeallproperties
                - unobserveallproperties
                - subscribeallevents
                - unsubscribeallevents
                - queryallactions
        exactly_one_of:
          - range: string
          - range: string
            multivalued: true
            minimum_value: 1
      href:
        required: true
        range: uri
        annotations:
          spec_description: >-
            Target IRI of a link or submission target of a form.
      contentCoding:
        range: string
      subprotocol:
        range: string
        pattern: ^(longpoll|websub|sse)$
        annotations:
          spec_type_values:
            value:
              mode: examples
              values:
                - longpoll
                - websub
                - sse
      security:
        any_of:
          - range: string
          - range: string
            multivalued: true
      scopes:
        any_of:
          - range: string
          - range: string
            multivalued: true

  ExpectedResponse:
    class_uri: hctl:ExpectedResponse
    description: Communication metadata describing the expected response message for the primary response.
    slots:
      - contentType


  AdditionalExpectedResponse:
    class_uri: hctl:AdditionalExpectedResponse
    description: Communication metadata describing the expected response message for additional responses.
    attributes:
      success:
        description: Signals if an additional response should not be considered an error.
        annotations:
          spec_default: true
        slot_uri: hctl:isSuccess
        range: boolean
      schema:
        description: >-
          Used to define the output data schema for an additional response if it differs from the default 
          output data schema. Rather than a DataSchema object, the name of a previous definition given in a 
          schemaDefinitions map must be used.
        annotations:
          spec_description: >-
            Used to define the output data schema for an additional response if it differs from the default output data schema. Rather than a `DataSchema` object, the name of a previous definition given in a `schemaDefinitions` map must be used.
        slot_uri: hctl:hasAdditionalOutputSchema
        range: string
      contentType:
        description: >-
          Assign a content type based on a media type (e.g., text/plain) and potential parameters
          (e.g., charset=utf-8) for the media type [RFC2046].
        annotations:
          spec_description: >-
            Assign a content type based on a media type (e.g., `text/plain`) and potential parameters (e.g., `charset=utf-8`) for the media type [[RFC2046]].
        slot_uri: hctl:forContentType
        range: string
