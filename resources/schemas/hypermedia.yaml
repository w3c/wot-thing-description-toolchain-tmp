id: https://www.w3.org/2019/wot/hypermedia
name: hypermedia
title: Hypermedia Controls Ontology
description: >-
  LinkML schema for modelling the TD Hypermedia Control information model, in particular links and forms.
version: "1.1-2-June-2025"
license: MIT
contributors: Mahda_Noura
see_also:
  - https://www.w3.org/TR/wot-thing-description11/#sec-hypermedia-vocabulary-definition
prefixes:
  hctl: https://www.w3.org/2019/wot/hypermedia#
  linkml: https://w3id.org/linkml/
  xsd: http://www.w3.org/2001/XMLSchema#
  td: https://www.w3.org/2019/wot/td#
  bcp47: https://tools.ietf.org/html/bcp47
  tm: https://www.w3.org/2019/wot/tm#

imports:
  - linkml:types


enums:
  SubprotocolList:
    permissible_values:
      longpoll:
      websub:
      sse:
  OperationType:
    description: >-
      Well-known operation types for WoT interaction model. The list of possible operation types of a form is fixed. 
      As of this version of the specification, it only includes the well-known types necessary to implement the WoT 
      interaction model.
    comments:
      - Consumer to Thing applies for messages sent by the Consumer to the Thing
      - Thing to Consumer applies for messages sent by the Thing to the Consumer
      - No correlation implies no payload is required or expected
    permissible_values:
      readproperty:
        description: Identifies the read operation on Property Affordances to retrieve the corresponding data
        comments:
          - Thing to Consumer - All fields in the Property Affordance without "writeOnly":true
          - Consumer to Thing - No correlation
      writeproperty:
        description: Identifies the write operation on Property Affordances to update the corresponding data
        comments:
          - Consumer to Thing - All fields in the Property Affordance without "readOnly":true
          - Thing to Consumer - No correlation, additionalResponses can be used in the form level
      observeproperty:
        description: >-
          Identifies the observe operation on Property Affordances to be notified with the new data when the 
          Property is updated
        comments:
          - Thing to Consumer - All fields in the Property Affordance without "writeOnly":true
          - Consumer to Thing - No correlation
      unobserveproperty:
        description: Identifies the unobserve operation on Property Affordances to stop the corresponding notifications
        comments:
          - No payload correlation in either direction
      invokeaction:
        description: Identifies the invoke operation on Action Affordances to perform the corresponding action
        comments:
          - Consumer to Thing - Value of the input key
          - Thing to Consumer - Value of the output key
      queryaction:
        description: Identifies the querying operation on Action Affordances to get the status of the corresponding action
        comments:
          - No correlation, additionalResponses can be used in the form level
      cancelaction:
        description: Identifies the cancel operation on Action Affordances to cancel the ongoing corresponding action
        comments:
          - No correlation, additionalResponses can be used in the form level
      subscribeevent:
        description: >-
          Identifies the subscribe operation on Event Affordances to be notified by the Thing when the event occurs
        comments:
          - Consumer to Thing - Value of the subscription key with all fields without "readOnly":true
          - Thing to Consumer - Value of the subscription key with all fields without "writeOnly":true
      unsubscribeevent:
        description: Identifies the unsubscribe operation on Event Affordances to stop the corresponding notifications
        comments:
          - Consumer to Thing - Value of the subscription key with all fields without "readOnly":true
          - Thing to Consumer - Value of the subscription key with all fields without "writeOnly":true
      readallproperties:
        description: >-
          Identifies the readallproperties operation on a Thing to retrieve the data of all Properties in a 
          single interaction
      writeallproperties:
        description: >-
          Identifies the writeallproperties operation on a Thing to update the data of all writable Properties 
          in a single interaction
      readmultipleproperties:
        description: >-
          Identifies the readmultipleproperties operation on a Thing to retrieve the data of selected Properties 
          in a single interaction
      writemultipleproperties:
        description: >-
          Identifies the writemultipleproperties operation on a Thing to update the data of selected writable 
          Properties in a single interaction
      observeallproperties:
        description: >-
          Identifies the observeallproperties operation on Properties to be notified with new data when any 
          Property is updated
      unobserveallproperties:
        description: >-
          Identifies the unobserveallproperties operation on Properties to stop notifications from all Properties 
          in a single interaction
      queryallactions:
        description: >-
          Identifies the queryallactions operation on a Thing to get the status of all Actions in a single interaction
      subscribeallevents:
        description: >-
          Identifies the subscribeallevents operation on Events to subscribe to notifications from all Events in 
          a single interaction
      unsubscribeallevents:
        description: >-
          Identifies the unsubscribeallevents operation on Events to unsubscribe from notifications from all Events 
          in a single interaction

slots:
  op:
    description: >-
      Indicates the operation type (e.g., readproperty, writeproperty, observeproperty, etc.)
    annotations:
      spec_table_definition: >-
        Indicates the semantic intention of performing the operation(s) described by the form. For example, the Property interaction allows get and set operations. The protocol binding may contain a form for the get operation and a different form for the set operation. The op attribute indicates which form is for which and allows the client to select the correct form for the operation required. op can be assigned one or more interaction verb(s) each representing a semantic intention of an operation.
    exactly_one_of:
      - range: string
      - range: string
        multivalued: true
        minimum_value: 1
  href:
    description: Target IRI of a link or submission target of a form.
    slot_uri: hctl:hasTarget
    range: uri
    required: true
  contentCoding:
    description: >-
      Content coding values indicate an encoding transformation that has been or can be applied to a representation. Content codings are primarily used to allow a representation to be compressed or otherwise usefully transformed without losing the identity of its underlying media type and without loss of information. Examples of content coding include "gzip", "deflate", etc.
    range: string
  contentType:
    description: >-
      Assign a content type based on a media type (e.g., text/plain) and potential parameters 
      (e.g., charset=utf-8) for the media type [RFC2046].
    annotations:
      spec_table_definition: >-
        Assign a content type based on a media type (e.g., `text/plain`) and potential parameters (e.g., `charset=utf-8`) for the media type [[RFC2046]].
    slot_uri: hctl:forContentType
    range: string
    required: true
  response:
    description: >-
      This optional term can be used if, e.g., the output communication metadata differ from input metadata (e.g., output contentType differ from the input contentType). The response name contains metadata that is only valid for the primary response messages.
    range: ExpectedResponse
  additionalResponses:
    description: >-
      This optional term can be used if additional expected responses are possible, e.g. for error reporting. Each additional response needs to be distinguished from others in some way (for example, by specifying a protocol-specific error code), and may also have its own data schema.
    multivalued: true
    range: AdditionalExpectedResponse
  subprotocol:
    description: >-
      Indicates the exact protocol that should be used for additional notifications.
    annotations:
      spec_table_definition: >-
        Indicates the exact mechanism by which an interaction will be accomplished for a given protocol when there are multiple options. For example, for HTTP and Events, it indicates which of several available mechanisms should be used for asynchronous notifications such as long polling (`longpoll`), WebSub [[websub]] (websub), Server-Sent Events (`sse`) [[html]] (also known as EventSource). Please note that there is no restriction on the subprotocol selection and other mechanisms can also be announced by this subprotocol term.
    range: SubprotocolList
    examples:
      - value: longpoll
      - value: websub
      - value: sse

classes:
  Link:
    class_uri: hctl:Link
    description: >-
      A link can be viewed as a statement of the form
      "**_link context_** has a **_relation type_** resource at **_link target_**",
      where the optional **_target attributes_** may further describe the resource.
    annotations:
      spec_table_definition: >-
        A link can be viewed as a statement of the form **"link context** has a **relation type** resource at **link target**", where the optional **target attributes** may further describe the resource.
      spec_scope_note: |
        :::NOTE
        
        The hreflang attribute is allowed to be a `string` or `array` in this version of the spec. Depending on the result of [[LINKSET-MEDIA-TYPES]] the values of `hrefLang` can be restricted to `array` only.
        :::
        
        Link relations can be used to describe relations such as to other Things (e.g., a Switch Thing controls a Lamp Thing), to a specific kind of Thing Models (e.g., a Thing Description is an instance of a specific Thing Model), or to further documentations information (e.g., device manual of a Thing). It is recommended to reuse existing and established Link Relation definitions from IANA.

        In the following a best practice relation type table is introduced that is recommended to use within WoT Thing Description or Thing Model instances.

      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    attributes:
      type:
        description: >-
          Target attribute providing a hint indicating what the media type [RFC2046] of the result of 
          dereferencing the link should be.
        annotations:
          spec_table_definition: >-
            Target attribute providing a hint indicating what the media type [[RFC2046]] of the result of dereferencing the link should be.
        slot_uri: hctl:hintsAtMediaType
        range: string
      rel:
        description: A link relation type identifies the semantics of a link.
        slot_uri: hctl:hasRelationType
        range: string
        comments:
          - Recommended to use IANA Link Relations when possible
      anchor:
        description: >-
          Overrides the link context (by default the Thing itself identified by its id) with the given URI or IRI.
        slot_uri: hctl:hasAnchor
        range: uri
      sizes:
        description: >-
          Target attribute that specifies one or more sizes for the referenced icon. Only applicable for relation 
          type "icon". The value pattern follows {Height}x{Width} (e.g., "16x16", "16x16 32x32").
        slot_uri: hctl:hasSizes
        range: string
        pattern: "^(\\d+x\\d+)(\\s+\\d+x\\d+)*$"
      hreflang:
        description: >-
          The hreflang attribute specifies the language of a linked document. The value of this must be a valid 
          language tag [BCP47].
        annotations:
          spec_table_definition: >-
            The hreflang attribute specifies the language of a linked document. The value of this must be a valid language tag [[BCP47]].
        slot_uri: hctl:hasHreflang
        exactly_one_of:
          - range: string
          - range: string
            multivalued: true
            minimum_value: 1
        comments:
          - The hreflang attribute is allowed to be a string or array in this version of the spec
    slot_usage:
      hreflang:
        exactly_one_of:
          - range: string
          - range: string
            multivalued: true
            minimum_value: 1

  Form:
    class_uri: hctl:Form
    description: >-
      A form hypermedia control that describes how an operation can be performed.
    annotations:
      spec_table_definition: >-
        A form can be viewed as a statement of "To perform an **operation type** operation on **form context**, make a **request method** request to **submission target**" where the optional **form fields** may further describe the required request. 
        In Thing Descriptions, the **form context** is the surrounding Object, such as Properties, Actions, and Events or the Thing itself for meta-interactions.
      spec_scope_note: |
        Possible values for the `contentCoding` property can be found, e.g., in the IANA HTTP content coding registry.

        The list of possible operation types of a form is fixed. As of this version of the specification, it only includes the well-known types necessary to implement the WoT interaction model described in [[wot-architecture11]]. Future versions of the standard may extend this list but operations types MUST be restricted to the values in the table below.
      jsonschema_config:
        tag: jsonschema_config
        value:
          additionalProperties: true
    slots:
      - href
      - contentType
      - contentCoding
      - security
      - scopes
      - response
      - additionalResponses
      - subprotocol
      - op

    slot_usage:
      op:
        exactly_one_of:
          - range: string
          - range: string
            multivalued: true
            minimum_value: 1
      href:
        required: true
        range: uri
      contentCoding:
        range: string
      subprotocol:
        range: string
        pattern: ^(longpoll|websub|sse)$
      security:
        range: string
        multivalued: true
      scopes:
        range: string
        multivalued: true

  ExpectedResponse:
    class_uri: hctl:ExpectedResponse
    description: Communication metadata describing the expected response message for the primary response.
    slots:
      - contentCoding


  AdditionalExpectedResponse:
    class_uri: hctl:AdditionalExpectedResponse
    description: Communication metadata describing the expected response message for additional responses.
    attributes:
      success:
        description: Signals if an additional response should not be considered an error.
        slot_uri: hctl:isSuccess
        range: boolean
      schema:
        description: >-
          Used to define the output data schema for an additional response if it differs from the default 
          output data schema. Rather than a DataSchema object, the name of a previous definition given in a 
          schemaDefinitions map must be used.
        annotations:
          spec_table_definition: >-
            Used to define the output data schema for an additional response if it differs from the default output data schema. Rather than a `DataSchema` object, the name of a previous definition given in a `schemaDefinitions` map must be used.
        slot_uri: hctl:hasAdditionalOutputSchema
        range: string
    slots:
      - contentType